name: Notify Profile Repo On Push

on:
  push:

jobs:
  notify-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger profile update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.PROFILE_UPDATE_TOKEN }}
          repository: Olabits-Dev/Olabits-Dev
          event-type: profile-update
